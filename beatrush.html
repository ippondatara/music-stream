<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Beat Rush - Music Stream</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=DM+Sans:wght@400;500;700&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box;}

body{
    background:
        radial-gradient(circle at top left, rgba(122,167,255,0.12), transparent 30%),
        radial-gradient(circle at bottom right, rgba(255,255,255,0.04), transparent 30%),
        #071a30;
    font-family:'DM Sans',sans-serif;
    color:white;
    min-height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
}

.game-box{
    position:relative;
    width:700px;
    background:rgba(255,255,255,0.04);
    border:1px solid rgba(255,255,255,0.08);
    border-radius:24px;
    padding:28px;
    backdrop-filter:blur(14px);
    box-shadow:0 20px 50px rgba(0,0,0,0.25);
}

h1{
    font-family:'Syne',sans-serif;
    text-align:center;
    font-size:42px;
    margin-bottom:8px;
}

.subtitle{
    text-align:center;
    color:#bfd0e5;
    margin-bottom:20px;
    font-size:14px;
}

.top-bar{
    display:flex;
    justify-content:space-between;
    margin-bottom:16px;
    font-weight:700;
}

canvas{
    display:block;
    margin:auto;
    background:#0d2747;
    border-radius:18px;
    border:1px solid rgba(255,255,255,0.08);
}

#gameOver{
    display:none;
    position:absolute;
    inset:0;
    background:rgba(7,26,48,0.94);
    border-radius:24px;
    justify-content:center;
    align-items:center;
    flex-direction:column;
    text-align:center;
}

button{
    border:none;
    border-radius:999px;
    padding:14px 30px;
    font-weight:700;
    cursor:pointer;
    font-family:'DM Sans',sans-serif;
}
</style>
</head>
<body>
<a href="biblioteca.html" class="back-btn">←</a>
<div class="game-box">
    <h1>Beat Rush</h1>
    <p class="subtitle">Esquiva patrones • Flechas ↑ ↓ ← →</p>

    <div class="top-bar">
        <div>Tiempo: <span id="score">0</span>s</div>
        <div>Récord: <span id="best">0</span>s</div>
        <div>Escudo: <span id="shield">No</span></div>
    </div>

    <canvas id="game" width="640" height="500"></canvas>

    <div id="gameOver">
        <h2 style="font-family:'Syne';font-size:54px;margin-bottom:10px;">Game Over</h2>
        <p style="color:#bfd0e5;margin-bottom:10px;">Sobreviviste</p>
        <div id="finalScore" style="font-family:'Syne';font-size:72px;margin-bottom:24px;">0s</div>
        <button id="retryBtn">Reintentar</button>
    </div>
</div>

<script>
const canvas = document.getElementById('game');
const ctx = canvas.getContext('2d');

const scoreEl = document.getElementById('score');
const bestEl = document.getElementById('best');
const shieldEl = document.getElementById('shield');

let best = Number(localStorage.getItem('beatDodgeBest')) || 0;
bestEl.textContent = best;

let player;
let bullets;
let shieldDrop;
let score;
let hasShield;
let gameRunning;
let keys = {};
let frame = 0;

function resetGame(){
    player = {
        x: canvas.width / 2,
        y: canvas.height - 80,
        size: 12,
        speed: 4
    };

    bullets = [];
    shieldDrop = null;
    score = 0;
    hasShield = false;
    gameRunning = true;
    frame = 0;

    shieldEl.textContent = 'No';
    scoreEl.textContent = '0';
    document.getElementById('gameOver').style.display = 'none';
}

function spawnLaserWarning(){
    const vertical = Math.random() > 0.5;

    if(vertical){
        bullets.push({
            type: 'warning',
            x: 80 + Math.random() * (canvas.width - 160),
            y: 0,
            width: 14,
            height: canvas.height,
            timer: 60
        });
    } else {
        bullets.push({
            type: 'warning',
            x: 0,
            y: 80 + Math.random() * (canvas.height - 160),
            width: canvas.width,
            height: 14,
            timer: 60
        });
    }
}

function spawnLaserAttack(warning){
    bullets.push({
        type: 'laser',
        x: warning.x,
        y: warning.y,
        width: warning.width,
        height: warning.height,
        timer: 40
    });
}

function spawnCirclePattern(){
    const centerX = 100 + Math.random() * (canvas.width - 200);
    const centerY = 80 + Math.random() * 160;

    /*
    Antes las bolitas parecían desordenadas porque cada una
    tenía velocidad distinta. Eso rompe el patrón visual.

    Ahora salen realmente en círculo: simétricas, limpias
    y estilo Touhou.
    */
    const totalOrbs = 36;
    const speed = 2.4;

    for(let i = 0; i < totalOrbs; i++){
        const angle = (Math.PI * 2 / totalOrbs) * i;

        bullets.push({
            type: 'orb',
            x: centerX,
            y: centerY,
            vx: Math.cos(angle) * speed,
            vy: Math.sin(angle) * speed,
            r: 5
        });
    }
}

function spawnShield(){
    shieldDrop = {
        x: 60 + Math.random() * (canvas.width - 120),
        y: 80 + Math.random() * 200,
        r: 10
    };
}

function update(){
    if(!gameRunning) return;

    frame++;

    if(keys['ArrowLeft']) player.x -= player.speed;
    if(keys['ArrowRight']) player.x += player.speed;
    if(keys['ArrowUp']) player.y -= player.speed;
    if(keys['ArrowDown']) player.y += player.speed;

    player.x = Math.max(player.size, Math.min(canvas.width - player.size, player.x));
    player.y = Math.max(player.size, Math.min(canvas.height - player.size, player.y));

    /* Más presión real:
       varias líneas coexistiendo y desfasadas */
    if(frame % 90 === 0) spawnLaserWarning();
    if(frame % 140 === 0) spawnLaserWarning();
    /* Muchísimos más círculos y sin sincronía perfecta */
    if(frame % 110 === 0) spawnCirclePattern();
    if(frame % 170 === 0) spawnCirclePattern();
    if(frame % 260 === 0) spawnCirclePattern();
    if(frame % 600 === 0 && !shieldDrop && !hasShield) spawnShield();

    bullets.forEach(b => {
        if(b.type === 'warning'){
            b.timer--;
            if(b.timer <= 0){
                spawnLaserAttack(b);
                b.remove = true;
            }
            return;
        }

        if(b.type === 'laser'){
            b.timer--;

            const hit =
                player.x > b.x &&
                player.x < b.x + b.width &&
                player.y > b.y &&
                player.y < b.y + b.height;

            if(hit){
                if(hasShield){
                    hasShield = false;
                    shieldEl.textContent = 'No';
                    b.remove = true;
                } else {
                    gameOver();
                }
            }

            if(b.timer <= 0) b.remove = true;
            return;
        }

        b.x += b.vx;
        b.y += b.vy;

        const dx = b.x - player.x;
        const dy = b.y - player.y;
        const dist = Math.sqrt(dx * dx + dy * dy);

        if(dist < b.r + player.size){
            if(hasShield){
                hasShield = false;
                shieldEl.textContent = 'No';
                b.remove = true;
            } else {
                gameOver();
            }
        }
    });

    bullets = bullets.filter(b => {
        if(b.remove) return false;

        if(b.type === 'warning' || b.type === 'laser') return true;

        return (
            b.x > -50 && b.x < canvas.width + 50 &&
            b.y > -50 && b.y < canvas.height + 50
        );
    });

    if(shieldDrop){
        const dx = shieldDrop.x - player.x;
        const dy = shieldDrop.y - player.y;
        const dist = Math.sqrt(dx * dx + dy * dy);

        if(dist < shieldDrop.r + player.size){
            hasShield = true;
            shieldEl.textContent = 'Sí';
            shieldDrop = null;
        }
    }

    score = Math.floor(frame / 60);
    scoreEl.textContent = score;
}

function draw(){
    ctx.clearRect(0, 0, canvas.width, canvas.height);

    bullets.forEach(b => {
        if(b.type === 'warning'){
            ctx.fillStyle = 'rgba(255,255,255,0.18)';
            ctx.fillRect(b.x, b.y, b.width, b.height);
            return;
        }

        if(b.type === 'laser'){
            ctx.fillStyle = 'rgba(255,80,80,0.75)';
            ctx.fillRect(b.x, b.y, b.width, b.height);
            return;
        }

        ctx.beginPath();
        ctx.fillStyle = '#ff6b6b';
        ctx.arc(b.x, b.y, b.r, 0, Math.PI * 2);
        ctx.fill();
    });

    if(shieldDrop){
        ctx.beginPath();
        ctx.strokeStyle = '#ffffff';
        ctx.lineWidth = 2;
        ctx.arc(shieldDrop.x, shieldDrop.y, shieldDrop.r, 0, Math.PI * 2);
        ctx.stroke();
    }

    if(hasShield){
        ctx.beginPath();
        ctx.strokeStyle = '#7aa7ff';
        ctx.lineWidth = 2;
        ctx.arc(player.x, player.y, player.size + 8, 0, Math.PI * 2);
        ctx.stroke();
    }

    ctx.fillStyle = '#7aa7ff';
    ctx.fillRect(
        player.x - player.size / 2,
        player.y - player.size / 2,
        player.size,
        player.size
    );
}

function gameOver(){
    gameRunning = false;

    if(score > best){
        best = score;
        localStorage.setItem('beatDodgeBest', best);
        bestEl.textContent = best;
    }

    document.getElementById('finalScore').textContent = score + 's';
    document.getElementById('gameOver').style.display = 'flex';
}

function loop(){
    update();
    draw();
    requestAnimationFrame(loop);
}

document.addEventListener('keydown', e => {
    keys[e.key] = true;
});

document.addEventListener('keyup', e => {
    keys[e.key] = false;
});

document.getElementById('retryBtn').addEventListener('click', resetGame);

resetGame();
loop();
</script>

</body>
</html>
