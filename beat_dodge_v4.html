
<style>
*{margin:0;padding:0;box-sizing:border-box;}
body{background:#071a30;font-family:sans-serif;color:white;display:flex;justify-content:center;align-items:flex-start;min-height:600px;padding:20px 0;}
.wrap{width:680px;}
h1{text-align:center;font-size:36px;margin-bottom:8px;color:white;letter-spacing:3px;font-weight:800;}
.top-bar{display:flex;justify-content:space-between;margin-bottom:10px;font-weight:700;font-size:13px;color:white;padding:0 4px;}
.canvas-wrap{position:relative;border-radius:18px;overflow:hidden;width:660px;}
canvas{display:block;}
#overlay{display:none;position:absolute;inset:0;background:rgba(7,26,48,0.95);justify-content:center;align-items:center;flex-direction:column;z-index:20;border-radius:18px;}
button{border:none;padding:11px 26px;border-radius:999px;font-weight:700;cursor:pointer;background:#7aa7ff;color:#071a30;font-size:15px;margin-top:10px;pointer-events:all;}
.hint{font-size:11px;color:rgba(255,255,255,0.35);text-align:center;margin-top:6px;letter-spacing:1px;}
</style>
<a href="biblioteca.html" class="back-btn">←</a>
<div class="wrap">
  <h1>Beat Rush</h1>
  <div class="top-bar">
    <div>⏱ <span id="score">0</span>s</div>
    <div id="attackLabel" style="color:rgba(255,255,255,0.4);font-size:11px;letter-spacing:2px;text-transform:uppercase;"></div>
    <div>🛡 <span id="shield">—</span> &nbsp;|&nbsp; DASH: <span id="dashcd">Listo</span></div>
  </div>
  <div class="canvas-wrap">
    <canvas id="bg" width="660" height="480" style="position:absolute;top:0;left:0;z-index:1;"></canvas>
    <canvas id="game" width="660" height="480" style="position:relative;z-index:2;"></canvas>
    <div id="overlay">
      <div style="font-size:52px;font-weight:800;color:white;letter-spacing:2px;">GAME OVER</div>
      <div id="finalScore" style="font-size:58px;margin:14px 0;font-weight:800;color:#7aa7ff;">0s</div>
      <button id="retryBtn">Reintentar</button>
    </div>
  </div>
  <div class="hint">Flechas / WASD · SHIFT = Dash · Esquiva todo</div>
</div>

<script>
const canvas=document.getElementById('game'),ctx=canvas.getContext('2d');
const bgCanvas=document.getElementById('bg'),bgCtx=bgCanvas.getContext('2d');
const W=660,H=480;
const scoreEl=document.getElementById('score'),shieldEl=document.getElementById('shield');
const attackLabelEl=document.getElementById('attackLabel'),dashCdEl=document.getElementById('dashcd');

// ── State ──
let player,bullets,particles,shieldDrop,hasShield;
let frame=0,score=0,gameRunning=false,keys={},screenShake=0;
let rotLaser=null,nextAttack=100;
let bgPulse=0;



function drawBg(){
  bgCtx.clearRect(0,0,W,H);
  bgCtx.fillStyle='#091c35';bgCtx.fillRect(0,0,W,H);
  // grid
  bgCtx.strokeStyle=`rgba(100,140,255,${0.025+bgPulse*0.04})`;bgCtx.lineWidth=0.5;
  for(let x=0;x<=W;x+=44){bgCtx.beginPath();bgCtx.moveTo(x,0);bgCtx.lineTo(x,H);bgCtx.stroke();}
  for(let y=0;y<=H;y+=44){bgCtx.beginPath();bgCtx.moveTo(0,y);bgCtx.lineTo(W,y);bgCtx.stroke();}
  // blobs
  lights.forEach(l=>{
    l.phase+=l.speed;l.x+=l.vx;l.y+=l.vy;
    if(l.x<-l.r)l.x=W+l.r;if(l.x>W+l.r)l.x=-l.r;
    if(l.y<-l.r)l.y=H+l.r;if(l.y>H+l.r)l.y=-l.r;
    const a=(0.035+0.025*Math.sin(l.phase))*(1+bgPulse*0.9);
    const[r,g,b]=l.col;
    const g2=bgCtx.createRadialGradient(l.x,l.y,0,l.x,l.y,l.r*(1+bgPulse*0.6));
    g2.addColorStop(0,`rgba(${r},${g},${b},${a})`);
    g2.addColorStop(1,`rgba(${r},${g},${b},0)`);
    bgCtx.fillStyle=g2;bgCtx.beginPath();bgCtx.arc(l.x,l.y,l.r*(1+bgPulse*0.6),0,Math.PI*2);bgCtx.fill();
  });

// ── Helpers ──
function rand(a,b){return a+Math.random()*(b-a);}
function randInt(a,b){return Math.floor(rand(a,b+1));}
function triggerBgPulse(v){bgPulse=Math.min(1,bgPulse+v);}

// ── Dash ──
const DASH_DIST=90,DASH_FRAMES=8,DASH_CD=60;

function resetGame(){
  player={x:W/2,y:H-80,size:9,speed:3.8,
    dashing:false,dashVx:0,dashVy:0,dashFrames:0,dashCd:0,invincible:0};
  bullets=[];particles=[];shieldDrop=null;hasShield=false;
  frame=0;score=0;gameRunning=true;screenShake=0;rotLaser=null;nextAttack=100;
  shieldEl.textContent='—';scoreEl.textContent='0';
  attackLabelEl.textContent='';dashCdEl.textContent='Listo';
  document.getElementById('overlay').style.display='none';
}

// ── Attacks ──
const ATTACKS=['laser_h','laser_v','circle_burst','spiral','aimed_wave','rot_laser',
               'ring_expand','corner_spray','wall_gap','homing_wave',
               'big_circle','expanding_ring_warn','cross_laser','scatter_shot'];
const ANAMES={laser_h:'Láser H',laser_v:'Láser V',circle_burst:'Explosión',spiral:'Espiral',
  aimed_wave:'Lluvia',rot_laser:'Láser Rotativo',ring_expand:'Anillos',corner_spray:'Esquinas',
  wall_gap:'Pared',homing_wave:'Dirigido',big_circle:'Círculo',
  expanding_ring_warn:'Anillo Peligro',cross_laser:'Cruz',scatter_shot:'Dispersión'};

function scheduleAttack(){
  const diff=Math.min(frame/3600,1);
  nextAttack=frame+Math.max(85,210-diff*125);
  launchAttack(ATTACKS[randInt(0,ATTACKS.length-1)]);
}

function launchAttack(type){
  attackLabelEl.textContent=ANAMES[type]||type;
  triggerBgPulse(0.28);

  if(type==='laser_h'){
    bullets.push({type:'warn',x:0,y:rand(60,H-60)-7,w:W,h:14,timer:55});
  } else if(type==='laser_v'){
    bullets.push({type:'warn',x:rand(60,W-60)-7,y:0,w:14,h:H,timer:55});
  } else if(type==='cross_laser'){
    // two simultaneous laser warnings (H+V)
    const cx=rand(150,W-150),cy=rand(100,H-100);
    bullets.push({type:'warn',x:0,y:cy-7,w:W,h:14,timer:60});
    bullets.push({type:'warn',x:cx-7,y:0,w:14,h:H,timer:60});
  } else if(type==='circle_burst'){
    const cx=80+Math.random()*(W-160),cy=60+Math.random()*(H*0.6);
    [24,14].forEach((n,ri)=>{
      const sp=ri===0?1.7:1.0;
      for(let i=0;i<n;i++){
        const a=(Math.PI*2/n)*i+(ri*Math.PI/n);
        bullets.push({type:'orb',x:cx,y:cy,vx:Math.cos(a)*sp,vy:Math.sin(a)*sp,r:ri===0?5:4,col:ri===0?'#ff6b6b':'#ff9f7f'});
      }
    });
  } else if(type==='spiral'){
    // ── FIXED: max radius so it stops growing ──
    const cx=W/2,cy=H/2;
    const arms=3,orbsPerArm=10,sp=1.8,maxR=Math.min(W,H)*0.48;
    for(let arm=0;arm<arms;arm++)
      for(let j=0;j<orbsPerArm;j++)
        bullets.push({type:'spiral_seed',cx,cy,delay:j*10,sp,baseAngle:(Math.PI*2/3)*arm,born:frame,maxR});
  } else if(type==='aimed_wave'){
    for(let r=0;r<3;r++) setTimeout(()=>{
      if(!gameRunning)return;
      const fromLeft=Math.random()>0.5;
      for(let i=0;i<6;i++){
        const sx=fromLeft?-10:W+10,sy=rand(30,H-30);
        const tx=player.x+rand(-50,50),ty=player.y+rand(-50,50);
        const dx=tx-sx,dy=ty-sy,len=Math.sqrt(dx*dx+dy*dy);
        bullets.push({type:'orb',x:sx,y:sy,vx:(dx/len)*2.8,vy:(dy/len)*2.8,r:5,col:'#ffb347'});
      }
    },r*300);
  } else if(type==='rot_laser'){
    rotLaser={angle:Math.random()*Math.PI*2,speed:0.017,timer:230,cx:W/2,cy:H/2,len:700,active:false,warnTimer:65};
  } else if(type==='ring_expand'){
    const cx=80+Math.random()*(W-160),cy=60+Math.random()*(H*0.55);
    for(let r=0;r<3;r++){
      const n=20+r*4,sp=1.4+r*0.3;
      for(let i=0;i<n;i++){
        const a=(Math.PI*2/n)*i;
        bullets.push({type:'ring_orb',x:cx,y:cy,vx:Math.cos(a)*sp,vy:Math.sin(a)*sp,r:4,delay:r*25,born:frame,col:`hsl(${200+r*40},80%,60%)`});
      }
    }
  } else if(type==='corner_spray'){
    [[0,0],[W,0],[0,H],[W,H]].forEach(([cx,cy])=>{
      const baseA=Math.atan2(H/2-cy,W/2-cx);
      for(let i=0;i<10;i++){
        const a=baseA+rand(-0.4,0.4);
        bullets.push({type:'orb',x:cx,y:cy,vx:Math.cos(a)*2,vy:Math.sin(a)*2,r:5,col:'#c084fc'});
      }
    });
  } else if(type==='wall_gap'){
    const fromTop=Math.random()>0.5,gapSize=90,gapX=30+Math.random()*(W-gapSize-60);
    for(let i=0;i<Math.floor(W/22);i++){
      const bx=i*22+11;
      if(bx>gapX&&bx<gapX+gapSize)continue;
      bullets.push({type:'orb',x:bx,y:fromTop?-12:H+12,vx:0,vy:fromTop?2.5:-2.5,r:8,col:'#f87171'});
    }
  } else if(type==='homing_wave'){
    for(let i=0;i<8;i++) setTimeout(()=>{
      if(!gameRunning)return;
      const side=randInt(0,3);let sx,sy;
      if(side===0){sx=rand(0,W);sy=-10;}else if(side===1){sx=rand(0,W);sy=H+10;}
      else if(side===2){sx=-10;sy=rand(0,H);}else{sx=W+10;sy=rand(0,H);}
      const dx=player.x-sx,dy=player.y-sy,len=Math.sqrt(dx*dx+dy*dy);
      bullets.push({type:'orb',x:sx,y:sy,vx:(dx/len)*2.2,vy:(dy/len)*2.2,r:6,col:'#fb7185',homing:true,homingStr:0.03});
    },i*130);
  } else if(type==='big_circle'){
    // ── NEW: big warning circle that then becomes solid ──
    const cx=rand(120,W-120),cy=rand(100,H-100);
    const r=rand(55,90);
    bullets.push({type:'bigCircleWarn',cx,cy,r,timer:70,thickness:14});
  } else if(type==='expanding_ring_warn'){
    // ── NEW: ring that expands from player position with warning ──
    const cx=rand(80,W-80),cy=rand(80,H-80);
    bullets.push({type:'expandRingWarn',cx,cy,r:0,maxR:Math.min(W,H)*0.55,timer:55,speed:3.5,col:'#f97316'});
  } else if(type==='scatter_shot'){
    // ── NEW: rapid random scatter from all sides ──
    const n=22;
    for(let i=0;i<n;i++) setTimeout(()=>{
      if(!gameRunning)return;
      const side=randInt(0,3);let sx,sy;
      if(side===0){sx=rand(0,W);sy=-8;}else if(side===1){sx=rand(0,W);sy=H+8;}
      else if(side===2){sx=-8;sy=rand(0,H);}else{sx=W+8;sy=rand(0,H);}
      const a=Math.atan2(H/2-sy,W/2-sx)+rand(-0.6,0.6);
      const sp=rand(1.8,3.2);
      bullets.push({type:'orb',x:sx,y:sy,vx:Math.cos(a)*sp,vy:Math.sin(a)*sp,r:rand(4,7),col:`hsl(${randInt(0,360)},80%,65%)`});
    },i*55);
  }
}

function spawnParticle(x,y,col,n=8){
  for(let i=0;i<n;i++){
    const a=Math.random()*Math.PI*2,sp=rand(1.5,4.5);
    particles.push({x,y,vx:Math.cos(a)*sp,vy:Math.sin(a)*sp,life:36,col,r:rand(1.5,3)});
  }
}

function tryDash(){
  if(player.dashing||player.dashCd>0)return;
  let dx=0,dy=0;
  if(keys['ArrowLeft']||keys['a'])dx=-1;
  if(keys['ArrowRight']||keys['d'])dx=1;
  if(keys['ArrowUp']||keys['w'])dy=-1;
  if(keys['ArrowDown']||keys['s'])dy=1;
  if(dx===0&&dy===0)dy=-1; // default: dash up
  const len=Math.sqrt(dx*dx+dy*dy);
  player.dashVx=(dx/len)*(DASH_DIST/DASH_FRAMES);
  player.dashVy=(dy/len)*(DASH_DIST/DASH_FRAMES);
  player.dashing=true;
  player.dashFrames=DASH_FRAMES;
  player.invincible=DASH_FRAMES+4;
  player.dashCd=DASH_CD;
  // ghost trail
  for(let i=0;i<5;i++) particles.push({
    x:player.x,y:player.y,vx:0,vy:0,life:12+i*3,
    col:'rgba(122,167,255,0.5)',r:player.size*0.7,ghost:true
  });
}

function update(){
  if(!gameRunning)return;
  frame++;

  // dash cooldown display
  if(player.dashCd>0){
    player.dashCd--;
    dashCdEl.textContent=player.dashCd>0?Math.ceil(player.dashCd/60*100)/100+'s':'Listo';
  } else dashCdEl.textContent='Listo';
  if(player.invincible>0)player.invincible--;

  if(player.dashing){
    player.x+=player.dashVx;player.y+=player.dashVy;
    player.dashFrames--;
    if(player.dashFrames<=0)player.dashing=false;
  } else {
    if(keys['ArrowLeft']||keys['a'])player.x-=player.speed;
    if(keys['ArrowRight']||keys['d'])player.x+=player.speed;
    if(keys['ArrowUp']||keys['w'])player.y-=player.speed;
    if(keys['ArrowDown']||keys['s'])player.y+=player.speed;
  }
  player.x=Math.max(player.size,Math.min(W-player.size,player.x));
  player.y=Math.max(player.size,Math.min(H-player.size,player.y));

  if(frame>=nextAttack)scheduleAttack();
  if(frame%600===0&&!shieldDrop&&!hasShield)
    shieldDrop={x:60+Math.random()*(W-120),y:80+Math.random()*(H*0.4),r:10,pulse:0};

  const inv=player.invincible>0;

  bullets.forEach(b=>{
    // ── Warning laser → laser ──
    if(b.type==='warn'){
      b.timer--;if(b.timer<=0){bullets.push({type:'laser',x:b.x,y:b.y,w:b.w,h:b.h,timer:45});b.remove=true;}return;
    }
    if(b.type==='laser'){
      b.timer--;
      if(!inv&&player.x>b.x&&player.x<b.x+b.w&&player.y>b.y&&player.y<b.y+b.h)triggerHit(b);
      if(b.timer<=0)b.remove=true;return;
    }
    // ── Big circle warning → big circle pulse ──
    if(b.type==='bigCircleWarn'){
      b.timer--;
      if(b.timer<=0){
        bullets.push({type:'bigCirclePulse',cx:b.cx,cy:b.cy,r:b.r,thickness:b.thickness,timer:35,col:'#ff4444'});
        b.remove=true;
      }
      return;
    }
    if(b.type==='bigCirclePulse'){
      b.timer--;
      // hit: player inside the ring band
      if(!inv){
        const dist=Math.sqrt((player.x-b.cx)**2+(player.y-b.cy)**2);
        const inner=b.r-b.thickness/2,outer=b.r+b.thickness/2;
        if(dist>inner-player.size&&dist<outer+player.size)triggerHit(b);
      }
      if(b.timer<=0)b.remove=true;
      return;
    }
    // ── Expanding ring with warning ──
    if(b.type==='expandRingWarn'){
      b.timer--;
      if(b.timer<=0){
        // start expanding
        b.type='expandRing';b.r=0;return;
      }
      return;
    }
    if(b.type==='expandRing'){
      b.r+=b.speed;
      if(!inv){
        const dist=Math.sqrt((player.x-b.cx)**2+(player.y-b.cy)**2);
        if(Math.abs(dist-b.r)<player.size+6)triggerHit(b);
      }
      if(b.r>b.maxR)b.remove=true;
      return;
    }
    // ── Spiral seed (capped radius) ──
    if(b.type==='spiral_seed'){
      const age=frame-b.born;if(age<b.delay)return;
      const ra=age-b.delay,a=b.baseAngle+ra*0.075,r=ra*b.sp*0.42;
      if(r>b.maxR){b.remove=true;return;}
      b.x=b.cx+Math.cos(a)*r;b.y=b.cy+Math.sin(a)*r;
      if(!inv){const dx=b.x-player.x,dy=b.y-player.y;if(Math.sqrt(dx*dx+dy*dy)<6+player.size)triggerHit(b);}
      return;
    }
    // ── Ring orb ──
    if(b.type==='ring_orb'){
      const age=frame-b.born;if(age<b.delay)return;
      b.x+=b.vx;b.y+=b.vy;
      if(b.x<-20||b.x>W+20||b.y<-20||b.y>H+20){b.remove=true;return;}
      if(!inv){const dx=b.x-player.x,dy=b.y-player.y;if(Math.sqrt(dx*dx+dy*dy)<b.r+player.size)triggerHit(b);}
      return;
    }
    // ── Regular orb ──
    if(b.type==='orb'){
      if(b.homing){
        const dx=player.x-b.x,dy=player.y-b.y,len=Math.sqrt(dx*dx+dy*dy);
        b.vx+=(dx/len)*b.homingStr;b.vy+=(dy/len)*b.homingStr;
        const spd=Math.sqrt(b.vx*b.vx+b.vy*b.vy);
        if(spd>3){b.vx=(b.vx/spd)*3;b.vy=(b.vy/spd)*3;}
      }
      b.x+=b.vx;b.y+=b.vy;
      if(b.x<-30||b.x>W+30||b.y<-30||b.y>H+30){b.remove=true;return;}
      if(!inv){const dx=b.x-player.x,dy=b.y-player.y;if(Math.sqrt(dx*dx+dy*dy)<b.r+player.size)triggerHit(b);}
    }
  });
  bullets=bullets.filter(b=>!b.remove);

  if(rotLaser){
    if(rotLaser.warnTimer>0){rotLaser.warnTimer--;}
    else{
      rotLaser.active=true;rotLaser.angle+=rotLaser.speed;rotLaser.timer--;
      const{cx,cy,angle,len}=rotLaser;
      const cos=Math.cos(angle),sin=Math.sin(angle);
      const t=(player.x-cx)*cos+(player.y-cy)*sin;
      const px=(player.x-cx)-t*cos,py=(player.y-cy)-t*sin;
      if(!inv&&Math.sqrt(px*px+py*py)<9&&t>-20&&t<len)triggerHit({remove:false});
      if(rotLaser.timer<=0)rotLaser=null;
    }
  }

  if(shieldDrop){
    shieldDrop.pulse+=0.07;
    const dx=shieldDrop.x-player.x,dy=shieldDrop.y-player.y;
    if(Math.sqrt(dx*dx+dy*dy)<shieldDrop.r+player.size){
      hasShield=true;shieldEl.textContent='Sí';shieldDrop=null;
    }
  }

  particles.forEach(p=>{p.x+=p.vx;p.y+=p.vy;if(!p.ghost)p.vy+=0.06;p.life--;});
  particles=particles.filter(p=>p.life>0);
  if(screenShake>0)screenShake*=0.8;
  score=Math.floor(frame/60);scoreEl.textContent=score;
}

function triggerHit(obj){
  if(hasShield){
    hasShield=false;shieldEl.textContent='—';
    spawnParticle(player.x,player.y,'#7aa7ff',14);
    if(obj&&'remove' in obj)obj.remove=true;
    screenShake=6;triggerBgPulse(0.5);
  } else {
    spawnParticle(player.x,player.y,'#ff6b6b',18);
    screenShake=18;triggerBgPulse(1.0);
    gameRunning=false;
    setTimeout(()=>{
      document.getElementById('finalScore').textContent=score+'s';
      document.getElementById('overlay').style.display='flex';
    },350);
  }
}

function draw(){
  ctx.clearRect(0,0,W,H);
  const sx=(Math.random()-0.5)*screenShake,sy=(Math.random()-0.5)*screenShake;
  ctx.save();ctx.translate(sx,sy);

  bullets.forEach(b=>{
    if(b.type==='warn'){
      ctx.fillStyle=`rgba(255,255,100,${0.1+0.08*Math.sin(Date.now()/80)})`;
      ctx.fillRect(b.x,b.y,b.w,b.h);return;
    }
    if(b.type==='laser'){
      ctx.fillStyle='rgba(255,55,55,0.85)';ctx.fillRect(b.x,b.y,b.w,b.h);
      ctx.fillStyle='rgba(255,255,255,0.35)';
      if(b.h>b.w)ctx.fillRect(b.x+4,b.y,b.w-8,b.h);
      else ctx.fillRect(b.x,b.y+4,b.w,b.h-8);
      return;
    }
    // big circle warning
    if(b.type==='bigCircleWarn'){
      const pulse=0.12+0.08*Math.sin(Date.now()/70);
      ctx.beginPath();ctx.strokeStyle=`rgba(255,200,50,${pulse})`;
      ctx.lineWidth=b.thickness;ctx.arc(b.cx,b.cy,b.r,0,Math.PI*2);ctx.stroke();
      // crosshair
      ctx.strokeStyle=`rgba(255,200,50,${pulse*0.5})`;ctx.lineWidth=1;
      ctx.beginPath();ctx.moveTo(b.cx-b.r*1.2,b.cy);ctx.lineTo(b.cx+b.r*1.2,b.cy);ctx.stroke();
      ctx.beginPath();ctx.moveTo(b.cx,b.cy-b.r*1.2);ctx.lineTo(b.cx,b.cy+b.r*1.2);ctx.stroke();
      return;
    }
    if(b.type==='bigCirclePulse'){
      const a=b.timer/35;
      ctx.beginPath();ctx.strokeStyle=`rgba(255,60,60,${0.5+0.4*a})`;
      ctx.lineWidth=b.thickness;ctx.arc(b.cx,b.cy,b.r,0,Math.PI*2);ctx.stroke();
      ctx.beginPath();ctx.strokeStyle=`rgba(255,255,255,${0.3*a})`;
      ctx.lineWidth=4;ctx.arc(b.cx,b.cy,b.r,0,Math.PI*2);ctx.stroke();
      return;
    }
    // expanding ring
    if(b.type==='expandRingWarn'){
      const pulse=0.1+0.07*Math.sin(Date.now()/60);
      // show target circle fading in
      ctx.beginPath();ctx.strokeStyle=`rgba(249,115,22,${pulse})`;
      ctx.lineWidth=4;ctx.setLineDash([8,6]);
      ctx.arc(b.cx,b.cy,b.maxR*0.3,0,Math.PI*2);ctx.stroke();
      ctx.setLineDash([]);
      // dot at center
      ctx.beginPath();ctx.fillStyle=`rgba(249,115,22,${pulse*2})`;
      ctx.arc(b.cx,b.cy,5,0,Math.PI*2);ctx.fill();
      return;
    }
    if(b.type==='expandRing'){
      const a=1-(b.r/b.maxR)*0.7;
      ctx.beginPath();ctx.strokeStyle=`rgba(255,120,30,${a})`;
      ctx.lineWidth=8;ctx.arc(b.cx,b.cy,b.r,0,Math.PI*2);ctx.stroke();
      ctx.beginPath();ctx.strokeStyle=`rgba(255,220,100,${a*0.5})`;
      ctx.lineWidth=2;ctx.arc(b.cx,b.cy,b.r,0,Math.PI*2);ctx.stroke();
      return;
    }
    if(b.type==='spiral_seed'){
      if(!b.x)return;
      ctx.beginPath();ctx.fillStyle='#a78bfa';ctx.arc(b.x,b.y,5,0,Math.PI*2);ctx.fill();return;
    }
    if(b.type==='ring_orb'){
      if(frame-b.born<b.delay)return;
      ctx.beginPath();ctx.fillStyle=b.col;ctx.arc(b.x,b.y,b.r,0,Math.PI*2);ctx.fill();return;
    }
    if(b.type==='orb'){
      ctx.beginPath();ctx.fillStyle=b.col||'#ff6b6b';ctx.arc(b.x,b.y,b.r,0,Math.PI*2);ctx.fill();
    }
  });

  // rotating laser
  if(rotLaser){
    const{cx,cy,angle,len,active}=rotLaser;
    const cos=Math.cos(angle),sin=Math.sin(angle);
    if(!active){
      ctx.strokeStyle=`rgba(255,255,100,${0.13+0.06*Math.sin(Date.now()/55)})`;ctx.lineWidth=14;
    } else {
      ctx.strokeStyle='rgba(255,55,55,0.9)';ctx.lineWidth=12;
    }
    ctx.beginPath();ctx.moveTo(cx-cos*len,cy-sin*len);ctx.lineTo(cx+cos*len,cy+sin*len);ctx.stroke();
    if(active){
      ctx.strokeStyle='rgba(255,255,255,0.45)';ctx.lineWidth=3;
      ctx.beginPath();ctx.moveTo(cx-cos*len,cy-sin*len);ctx.lineTo(cx+cos*len,cy+sin*len);ctx.stroke();
    }
  }

  // shield drop
  if(shieldDrop){
    const p=Math.sin(shieldDrop.pulse)*3;
    ctx.beginPath();ctx.strokeStyle='rgba(255,255,255,0.8)';ctx.lineWidth=2;
    ctx.arc(shieldDrop.x,shieldDrop.y,shieldDrop.r+p,0,Math.PI*2);ctx.stroke();
    ctx.fillStyle='rgba(122,167,255,0.25)';ctx.fill();
    ctx.fillStyle='white';ctx.font='bold 11px sans-serif';ctx.textAlign='center';
    ctx.fillText('S',shieldDrop.x,shieldDrop.y+4);
  }

  // particles
  particles.forEach(p=>{
    ctx.globalAlpha=Math.max(0,p.life/36);
    ctx.beginPath();ctx.fillStyle=p.col;ctx.arc(p.x,p.y,p.r,0,Math.PI*2);ctx.fill();
    ctx.globalAlpha=1;
  });

  // shield ring on player
  if(hasShield){
    ctx.beginPath();ctx.strokeStyle='rgba(122,167,255,0.85)';ctx.lineWidth=2;
    ctx.arc(player.x,player.y,player.size+10,0,Math.PI*2);ctx.stroke();
  }

  // player — flicker during invincibility
  const showPlayer=!player.invincible||(Math.floor(frame/3)%2===0);
  if(showPlayer){
    const s=player.size;
    ctx.fillStyle=player.dashing?'#c4d8ff':'#7aa7ff';
    ctx.fillRect(player.x-s/2,player.y-s/2,s,s);
    ctx.fillStyle='rgba(255,255,255,0.7)';ctx.fillRect(player.x-2,player.y-2,4,4);
  }

  ctx.restore();
}

function loop(){
  drawBg();
  update();
  draw();
  requestAnimationFrame(loop);
}

document.addEventListener('keydown',e=>{
  keys[e.key]=true;
  if(e.key==='Shift')tryDash();
  e.preventDefault();
});
document.addEventListener('keyup',e=>{keys[e.key]=false;});
document.getElementById('retryBtn').addEventListener('click',resetGame);

resetGame();loop();
</script>
