<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Reproductor</title>

<style>
:root {
    --accent: #4c6ef5;
    --card: rgba(15,42,74,0.85);
    --text: #fff;
    --muted: #b0c4de;
}

* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
}

body {
    font-family: 'Segoe UI', sans-serif;
    background-size: cover;
    background-position: center;
    transition: background 0.5s ease;
}

/* BLUR + OSCURO */
body::before {
    content: "";
    position: fixed;
    inset: 0;
    backdrop-filter: blur(10px);
    background: rgba(0,0,0,0.6);
    z-index: -1;
}

/* PLAYER */
.main {
    height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;
}

.player {
    width: 300px;
    background: var(--card);
    border-radius: 20px;
    overflow: hidden;
    backdrop-filter: blur(20px);
    border: 1px solid rgba(255,255,255,0.08);
    box-shadow: 0 24px 60px rgba(0,0,0,0.5);
}

.cover {
    width: 100%;
    height: 300px;
    background-size: cover;
    background-position: center;
    transition: background-image 0.4s ease;
}

.player-body {
    padding: 20px 22px 22px;
}

#title {
    font-weight: 700;
    font-size: 17px;
    color: #FFF;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
}

#artist {
    color: var(--muted);
    font-size: 13px;
    margin-top: 3px;
    margin-bottom: 0;
}

.progress-container {
    height: 4px;
    background: rgba(255,255,255,0.12);
    border-radius: 999px;
    margin: 16px 0 4px;
    cursor: pointer;
    position: relative;
}

.progress-container:hover {
    height: 6px;
    margin-top: 15px;
}

.progress {
    height: 100%;
    width: 0%;
    background: var(--accent);
    border-radius: 999px;
    transition: width 0.1s linear;
}

.controls {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-top: 18px;
    padding: 0 4px;
}

.btn {
    background: none;
    border: none;
    color: rgba(255,255,255,0.7);
    font-size: 20px;
    cursor: pointer;
    transition: color 0.15s, transform 0.1s;
    padding: 6px;
}

.btn:hover {
    color: #fff;
    transform: scale(1.1);
}

.play {
    background: var(--accent);
    width: 50px;
    height: 50px;
    border-radius: 50%;
    display: flex;
    justify-content: center;
    align-items: center;
    font-size: 18px;
    color: #fff;
    box-shadow: 0 4px 20px rgba(76,110,245,0.5);
    transition: background 0.15s, transform 0.1s;
}

.play:hover {
    background: #6b85f7;
    transform: scale(1.06);
}

.loop-active {
    color: var(--accent) !important;
}

.song-panel {
    position: fixed;
    right: -300px;
    top: 0;
    width: 280px;
    height: 100%;
    background: rgba(6, 18, 36, 0.97);
    backdrop-filter: blur(20px);
    border-left: 1px solid rgba(255,255,255,0.07);
    padding: 60px 16px 20px;
    transition: right 0.35s cubic-bezier(0.4, 0, 0.2, 1);
    overflow-y: auto;
}

.song-panel.open {
    right: 0;
}

.song-panel-title {
    font-size: 11px;
    font-weight: 700;
    letter-spacing: 2px;
    text-transform: uppercase;
    color: rgba(255,255,255,0.3);
    margin-bottom: 14px;
    padding: 0 6px;
}

.song {
    padding: 10px 12px;
    border-radius: 10px;
    cursor: pointer;
    margin-bottom: 4px;
    color: rgba(255,255,255,0.65);
    font-size: 13px;
    display: flex;
    flex-direction: column;
    gap: 2px;
    transition: background 0.15s, color 0.15s;
}

.song span.song-name {
    font-weight: 600;
    color: inherit;
}

.song span.song-artist {
    font-size: 11px;
    color: rgba(255,255,255,0.35);
}

.song.active {
    background: rgba(76,110,245,0.18);
    color: #fff;
    border-left: 3px solid var(--accent);
    padding-left: 9px;
}

.song.active .song-artist {
    color: rgba(255,255,255,0.5);
}

.song:hover:not(.active) {
    background: rgba(255,255,255,0.06);
    color: #fff;
}

.toggle {
    position: fixed;
    right: 14px;
    top: 14px;
    background: rgba(255,255,255,0.1);
    border: 1px solid rgba(255,255,255,0.12);
    color: white;
    width: 38px;
    height: 38px;
    border-radius: 10px;
    cursor: pointer;
    font-size: 16px;
    display: flex;
    align-items: center;
    justify-content: center;
    backdrop-filter: blur(10px);
    transition: background 0.15s;
}

.toggle:hover {
    background: rgba(255,255,255,0.18);
}
.back-btn {
    position: fixed;
    top: 15px;
    left: 15px;
    background: rgba(0,0,0,0.6);
    color: white;
    border: none;
    padding: 10px 15px;
    border-radius: 10px;
    cursor: pointer;
    font-size: 14px;
    backdrop-filter: blur(10px);
    transition: 0.2s;
}

.back-btn:hover {
    background: rgba(0,0,0,0.8);
}
</style>
</head>

<body>
<a href="biblioteca.html" class="back-btn" style="position:fixed;top:15px;left:15px;background:rgba(0,0,0,0.6);color:white;border:none;padding:10px 15px;border-radius:10px;cursor:pointer;font-size:14px;backdrop-filter:blur(10px);text-decoration:none;">←</a><div class="main">
    <div class="player">
    <div class="cover" id="cover"></div>
    <div class="player-body">         <!-- ← nuevo wrapper -->
        <h3 id="title"></h3>
        <p id="artist"></p>
    <div class="controls">
            <button class="btn" id="prev">⏮</button>
            <button class="btn play" id="play">▶</button>
            <button class="btn" id="next">⏭</button>
            <button class="btn" id="loop">↺</button>
</div>

<div class="song-panel" id="panel">
    <div class="song-panel-title">Lista de canciones</div>  <!-- ← nuevo -->
</div>
<button class="toggle" id="toggle">☰</button>

<audio id="audio"></audio>

<script>
const songs = [
    {
        title: "V1ViD",
        artist: "Jennifer",
        src: "https://ippondatara.github.io/Music-Stream/V1ViD.mp3",
        cover: "https://i.pinimg.com/736x/2b/00/ca/2b00ca59cf2363554ebcd0081e246dfd.jpg"
    },
    {
        title: "Swing",
        artist: "Misu",
        src: "https://ippondatara.github.io/Music-Stream/Swing.mp3",
        cover: "https://i.pinimg.com/736x/f2/f3/b1/f2f3b10f1e24055248b08f96e242a1a2.jpg"
    },
    {
        title: "Midnight Engine Chase",
        artist: "Mia",
        src: "https://ippondatara.github.io/Music-Stream/Midnight%20Engine%20Chase.mp3",
        cover: "https://i.pinimg.com/1200x/1e/4f/ca/1e4fca5deebeef628a036947805b89f0.jpg"
    },
    {
        title: "Till 2AM",
        artist: "Luciana",
        src: "https://ippondatara.github.io/Music-Stream/After%202AM.mp3",
        cover: "https://i.pinimg.com/736x/25/4c/28/254c28cc1158f67fd8fbf3303372d4d7.jpg"
    }
];

let current = Math.floor(Math.random() * songs.length);
let isLoop = false;

const audio = document.getElementById("audio");
const title = document.getElementById("title");
const artist = document.getElementById("artist");
const cover = document.getElementById("cover");
const playBtn = document.getElementById("play");
const progress = document.getElementById("progress");
const panel = document.getElementById("panel");

/* LOAD SONG */
function loadSong(i){
    const s = songs[i];

    title.textContent = s.title;
    artist.textContent = s.artist;
    audio.src = s.src;

    cover.style.backgroundImage = `url(${s.cover})`;
    document.body.style.backgroundImage = `url(${s.cover})`;

    updateActiveSong();
}

/* PLAY / PAUSE */
function playSong(){
    audio.play();
    playBtn.textContent = "⏸";
}

function pauseSong(){
    audio.pause();
    playBtn.textContent = "▶";
}

playBtn.onclick = () => audio.paused ? playSong() : pauseSong();

/* NEXT / PREV */
document.getElementById("next").onclick = () => {
    current = (current + 1) % songs.length;
    loadSong(current);
    playSong();
};

document.getElementById("prev").onclick = () => {
    current = (current - 1 + songs.length) % songs.length;
    loadSong(current);
    playSong();
};

/* LOOP */
document.getElementById("loop").onclick = (e) => {
    isLoop = !isLoop;
    audio.loop = isLoop;
    e.target.classList.toggle("loop-active");
};

/* PROGRESS */
audio.ontimeupdate = () => {
    const percent = (audio.currentTime / audio.duration) * 100;
    progress.style.width = percent + "%";
};
    audio.onended = () => {
    current = (current + 1) % songs.length;
    loadSong(current);
    playSong();
};

document.getElementById("progressContainer").onclick = (e) => {
    const w = e.currentTarget.clientWidth;
    audio.currentTime = (e.offsetX / w) * audio.duration;
};

/* PANEL */
document.getElementById("toggle").onclick = () => {
    panel.classList.toggle("open");
};

/* SONG LIST */
function updateActiveSong(){
    document.querySelectorAll(".song").forEach((el, i) => {
        el.classList.toggle("active", i === current);
    });
}

songs.forEach((s, i) => {
    const div = document.createElement("div");
    div.className = "song";
   const nombre = document.createElement("span");
nombre.className = "song-name";
nombre.textContent = s.title;

const artista = document.createElement("span");
artista.className = "song-artist";
artista.textContent = s.artist;

div.appendChild(nombre);
div.appendChild(artista);

    div.onclick = () => {
        current = i;
        loadSong(i);
        playSong();
    };

    panel.appendChild(div);
});

/* INIT */
loadSong(current);

</script>

</body>
</html>
